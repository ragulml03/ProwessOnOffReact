<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OffOn</title>

    <!--
      In PRODUCTION (dotnet publish), AbTestMiddleware injects window.AB_TEST_DATA
      immediately after this <head> tag so scripts below can read it synchronously.

      In DEVELOPMENT (Vite on :5173), the .NET middleware can't reach this origin,
      so we fetch the data asynchronously from the .NET API and fire a custom event.
    -->

    <!-- STEP 1 — Async AB_TEST_DATA bootstrap for dev; no-op in production. -->
    <script>
    (function () {
      if (window.AB_TEST_DATA) {
        window.dispatchEvent(new CustomEvent("abTestDataReady"));
        return;
      }
      fetch("/api/ab-test-context")
        .then(function (r) { return r.json(); })
        .then(function (data) {
          window.AB_TEST_DATA = data;
          window.dispatchEvent(new CustomEvent("abTestDataReady"));
        })
        .catch(function () {
          var storedUserId = "";
          try { storedUserId = JSON.parse(localStorage.getItem("ld-user-key") || '""') || ""; } catch (e) {}
          window.AB_TEST_DATA = {
            platform_version: "react_modern",
            user_id: storedUserId,
            migration_group: "react-migration-test-enabled"
          };
          window.dispatchEvent(new CustomEvent("abTestDataReady"));
        });
    }());
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
